<div class="why row"
    {{ ext.ui.toolbar(node.uri, "sectionEntry" , ["editContent", "editAttributes" , "deleteSection" ], {"uri": node.uri, "form": "attributes"}) | raw }}

>
<section id="why" class="bg-slate-900 text-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14 sm:py-20">
        <div class="grid grid-cols-1 lg:grid-cols-[0.9fr_1.1fr] gap-8 lg:gap-14 items-start">
            <div>
                <p class="text-sm font-semibold tracking-wide uppercase text-cyan-300 mb-3">{{ node.meta.top_title }}</p>
                <h2 class="text-3xl sm:text-4xl font-bold leading-tight">
                    {{ node.meta.getOrDefault("title", "--title here--") }}
                </h2>
            </div>
            <div class="space-y-5 text-lg leading-8 text-slate-200">
                {{ node.content | raw }}
            </div>
        </div>
    </div>
</section>
</div>
