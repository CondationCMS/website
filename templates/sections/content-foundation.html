<div class="why row"
    {{ ext.ui.toolbar(node.uri, "sectionEntry" , ["editContent", "editAttributes" , "deleteSection" ], {"uri": node.uri, "form": "attributes"}) | raw }}

>
    <section id="foundation" class="bg-gray-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-20">
            <div class="max-w-3xl mb-10">
                <p class="text-sm font-semibold tracking-wide uppercase text-blue-600 mb-3">{{ node.meta.title }}</p>
                <h2 class="text-3xl sm:text-4xl font-bold text-gray-950">{{ node.meta.description }}</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                {% for item in node.meta.items %}
                    <article class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm hover:shadow-md transition-shadow">
                        {% assign index = loop.index + 1 %}
                        <div class="mb-5 flex h-11 w-11 items-center justify-center rounded-lg bg-blue-50 text-blue-700 font-bold">0{{ index }}</div>
                        <h3 class="text-xl font-semibold text-gray-950 mb-3">{{ item.title }}</h3>
                        <p class="text-gray-600 leading-7">{{ item.description }}</p>
                    </article>
                {% endfor %}
            </div>
        </div>
    </section>
</div>
